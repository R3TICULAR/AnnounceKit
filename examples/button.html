<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Button Examples</title>
</head>
<body>
  <!-- Simple button -->
  <button>Click me</button>

  <!-- Button with aria-label -->
  <button aria-label="Close dialog">×</button>

  <!-- Button with aria-expanded -->
  <button aria-expanded="false">Show menu</button>

  <!-- Button with aria-pressed -->
  <button aria-pressed="false">Toggle feature</button>

  <!-- Disabled button -->
  <button disabled>Submit</button>

  <!-- Button with aria-describedby -->
  <button aria-describedby="help-text">Submit form</button>
  <div id="help-text">Click to submit the form</div>

  <!-- Input button -->
  <input type="button" value="Input button">

  <!-- Submit button -->
  <input type="submit" value="Submit form">

  <!-- Reset button -->
  <input type="reset" value="Reset form">

  <!-- Div with button role -->
  <div role="button" tabindex="0">Custom button</div>
</body>
</html>
