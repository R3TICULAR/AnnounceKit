<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heading Examples</title>
</head>
<body>
  <!-- Proper heading hierarchy -->
  <h1>Main Page Title</h1>
  
  <h2>Section 1</h2>
  <p>Content for section 1.</p>
  
  <h3>Subsection 1.1</h3>
  <p>Content for subsection 1.1.</p>
  
  <h3>Subsection 1.2</h3>
  <p>Content for subsection 1.2.</p>
  
  <h2>Section 2</h2>
  <p>Content for section 2.</p>
  
  <h3>Subsection 2.1</h3>
  <p>Content for subsection 2.1.</p>

  <!-- Heading with aria-level -->
  <div role="heading" aria-level="2">Custom heading</div>

  <!-- Heading with aria-label -->
  <h2 aria-label="Products and Services">Products &amp; Services</h2>
</body>
</html>
