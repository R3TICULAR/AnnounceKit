<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Product Page - After</title></head>
<body>
  <header>
    <nav aria-label="Main navigation">
      <a href="/">Home</a>
      <a href="/products">Products</a>
      <a href="/cart" aria-label="Shopping cart, 3 items">Cart (3)</a>
    </nav>
  </header>

  <main>
    <h1>Wireless Headphones</h1>
    <h2>Product Details</h2>
    <p>Premium noise-cancelling headphones with 30-hour battery life.</p>

    <img src="headphones.jpg" alt="Black wireless over-ear headphones">

    <form aria-label="Add to cart">
      <label for="qty">Quantity</label>
      <input id="qty" type="number" value="1" required>
      <button type="submit">Add to Cart — $299</button>
      <button type="button" aria-label="Save to wishlist">♡</button>
    </form>

    <section aria-label="Customer Reviews">
      <h2>Customer Reviews</h2>
      <p>4.8 out of 5 stars based on 142 reviews.</p>
    </section>
  </main>

  <footer>
    <nav aria-label="Footer links">
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
      <a href="/accessibility">Accessibility</a>
    </nav>
  </footer>
</body>
</html>
