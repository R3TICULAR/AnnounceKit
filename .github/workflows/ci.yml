name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run tests with coverage
        if: matrix.node-version == '20.x'
        run: npm run test:coverage

      - name: Upload coverage report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify executable
        run: |
          test -f dist/cli.js || (echo "CLI executable not found" && exit 1)
          test -f dist/index.js || (echo "Library entry not found" && exit 1)
          echo "Build artifacts verified"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  lint:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  a11y-dogfood:
    name: Accessibility Dogfood
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Run audit on example pages
        run: |
          echo "=== Running Speakable audit on all example HTML files ==="
          for file in examples/*.html; do
            echo ""
            echo "--- Auditing: $file ---"
            node dist/cli.js "$file" -f audit || true
          done

      - name: Run screen reader simulation (all readers)
        run: |
          echo "=== Running screen reader simulation on navigation.html ==="
          node dist/cli.js examples/navigation.html -f text -s all

      - name: Run semantic diff check
        run: |
          echo "=== Running semantic diff between button.html and form.html ==="
          node dist/cli.js examples/form.html --diff examples/button.html -f text || true

      - name: Verify JSON output is valid
        run: |
          echo "=== Verifying JSON output for all example files ==="
          for file in examples/*.html; do
            echo "Checking: $file"
            node dist/cli.js "$file" -f json | node -e "
              let data = '';
              process.stdin.on('data', c => data += c);
              process.stdin.on('end', () => {
                JSON.parse(data);
                console.log('  ✓ Valid JSON');
              });
            "
          done
